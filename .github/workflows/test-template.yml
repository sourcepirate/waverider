name: Test Cookiecutter Template

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r test-requirements.txt
    
    - name: Run tox validation
      run: |
        tox -e validate
    
    - name: Run tox tests
      run: |
        tox -e py

  comprehensive-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r test-requirements.txt
    
    - name: Run comprehensive tests
      run: |
        tox -e all-tests

  dependency-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install cookiecutter
      run: pip install cookiecutter
      
    - name: Generate template
      run: |
        cookiecutter . --no-input --output-dir /tmp/test-project project_name="Test Project" project_slug="test_project"
        
    - name: Check dependencies compatibility
      run: |
        cd /tmp/test-project/test_project
        pip install -r requirements/local.txt
        pip check
