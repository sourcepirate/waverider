[tox]
envlist = py312,py313,validate,all-tests
skipsdist = true
skip_missing_interpreters = true

[testenv]
deps = 
    -r{toxinidir}/test-requirements.txt
commands = 
    python -m pytest tests/test_cookiecutter.py -v

[testenv:validate]
deps = 
    -r{toxinidir}/test-requirements.txt
commands = 
    python validate_template.py

[testenv:quick-test]
deps = 
    -r{toxinidir}/test-requirements.txt
commands = 
    python tests/quick_test.py

[testenv:template-test]
deps = 
    -r{toxinidir}/test-requirements.txt
commands = 
    python tests/run_tests.py

[testenv:lint]
deps = 
    ruff>=0.15.20
commands = 
    ruff check .
    ruff format --check .

[testenv:format]
deps = 
    ruff>=0.15.20
commands = 
    ruff check --fix .
    ruff format .

[testenv:coverage]
deps = 
    -r{toxinidir}/test-requirements.txt
    coverage>=7.14.3
commands = 
    coverage run -m pytest tests/test_cookiecutter.py
    coverage report -m
    coverage html
    coverage xml

[testenv:all-tests]
deps = 
    -r{toxinidir}/test-requirements.txt
commands = 
    python validate_template.py
    python tests/quick_test.py
    python -m pytest tests/test_cookiecutter.py -v

[coverage:run]
source = .
omit = 
    .tox/*
    */.tox/*
    */tests/*
    test_*.py
    setup.py
    hooks/*
    {{ cookiecutter.project_slug }}/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
